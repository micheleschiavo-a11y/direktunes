      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

    .card {

      margin-bottom: 48px;
    }
    .btn {

      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-apple {
      background: #1A1A1A;
      border: 1px solid #C8A951;
      color: #FFFFFF;
    }
    .btn-google {
      background: #C8A951;
      color: #0A0A0A;
    }
    .btn svg { flex-shrink: 0; }
    .footer {

      color: #333;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
