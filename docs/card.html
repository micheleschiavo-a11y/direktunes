<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miskia – Promo Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px 20px;
    }

    .card {
      background: #0A0A0A;
      border: 1px solid #2A2A2A;
      border-radius: 28px;
      width: 100%;
      max-width: 560px;
      padding: 48px 40px 40px;
      text-align: center;
    }

    /* Top accent line */
    .top-bar {
      width: 48px;
      height: 3px;
      background: #C8A951;
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .artist {
      color: #FFFFFF;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .album {
      color: #C8A951;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tagline {
      color: #444;
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    /* QR section */
    .qr-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .qr-block {
      flex: 1;
      max-width: 200px;
    }

    .qr-frame {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .qr-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .qr-label svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      width: 1px;
      background: #1E1E1E;
      align-self: stretch;
      margin: 8px 0;
    }

    /* Bottom strip */
    .bottom {
      border-top: 1px solid #1A1A1A;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bottom-left {
      text-align: left;
    }

    .cta {
      color: #555;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .url {
      color: #C8A951;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge {
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 20px;
      padding: 6px 14px;
    }

    .badge-text {
      color: #444;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>

    <div class="artist">Miskia</div>
    <div class="album">Musica qualunque</div>
    <div class="tagline">6 songs · 2026 · No ads · No subscription</div>

    <div class="qr-row">
      <!-- iPhone -->
      <div class="qr-block">
        <div class="qr-frame">
          <img src="qr-appstore.png" alt="App Store QR code" />
        </div>
        <div class="qr-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#888">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          iPhone
        </div>
      </div>

      <div class="divider"></div>

      <!-- Android -->
      <div class="qr-block">
        <div class="qr-frame">
          <img src="qr-googleplay.png" alt="Google Play QR code" />
        </div>
        <div class="qr-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#888">
            <path d="M3.18 23.76c.3.17.64.24.99.2L14.54 12 3.18.04c-.35-.04-.69.03-.99.2C1.6.72 1.2 1.39 1.2 2.12v19.76c0 .73.4 1.4 1.98 1.88zM16.15 13.41l2.7 2.7-9.96 5.66 7.26-8.36zM20.5 10.5c.5.28.8.8.8 1.5s-.3 1.22-.8 1.5l-2.22 1.26-2.96-2.96 2.96-2.96 2.22 1.26zM8.89 12L3.18 5.96l9.96 5.66-2.25 1.28z"/>
          </svg>
          Android
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="bottom-left">
        <div class="cta">Scan to download</div>
        <div class="url">micheleschiavo-a11y.github.io/direktunes</div>
      </div>
      <div class="badge">
        <div class="badge-text">Owned Outright</div>
      </div>
    </div>
  </div>
</body>
</html>
